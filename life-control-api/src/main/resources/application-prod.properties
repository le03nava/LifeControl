# ============================================
# Production profile overrides
# ============================================

# Production — disable SQL logging for security and performance
spring.jpa.show-sql=false

# Production — use Redis for caching (ensure REDIS_HOST and REDIS_PORT are set)
spring.cache.type=redis

# Production — reduce logging noise
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.lifecontrol.api=INFO