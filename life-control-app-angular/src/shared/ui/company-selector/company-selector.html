<div class="company-selector">
  @if (loading()) {
    <span class="loading-text">Cargando...</span>
  } @else if (companies().length === 0) {
    <span class="empty-label">Sin empresas</span>
  } @else {
    <mat-select
      [value]="currentCompany()?.companyKey ?? null"
      (selectionChange)="onCompanyChange($event.value)"
      placeholder="Seleccionar empresa"
    >
      @for (company of companies(); track company.companyKey) {
        <mat-option [value]="company.companyKey">
          {{ company.companyName }}
        </mat-option>
      }
    </mat-select>
  }
</div>
