<header class="header">
  <button
    app-button
    variant="secondary"
    size="large"
    (buttonClick)="toggleMenu()"
    class="menu-toggle"
  >
    &#9776;
  </button>
  <a app-hyperlink routerLink="/" size="large">
    <mat-icon class="menu-icon">home</mat-icon>
    <span class="nav-item-text">Life Control</span>
  </a>

  @if (isMenuOpen()) {
    <nav class="nav-menu" animate.enter="nav-menu-enter" animate.leave="nav-menu-leave">
      <button app-button size="large" (buttonClick)="toggleMenu()" class="menu-toggle">X</button>
      <ul>
        @for (item of items(); track item.id) {
          <li class="nav-item">
            <a app-hyperlink [routerLink]="item.routeLink" size="large">
              <mat-icon class="menu-icon">{{ item.icon }}</mat-icon>
              <span class="nav-item-text">{{ item.textLink }}</span>
            </a>
          </li>
        }
      </ul>

      <div class="nav-actions">
        @if (authenticated) {
          <button class="user-menu-trigger" [matMenuTriggerFor]="userMenu">
            <mat-icon>account_circle</mat-icon>
            <span class="user-name">{{ userName() }}</span>
          </button>
          <mat-menu #userMenu="matMenu">
            <button mat-menu-item (click)="viewProfile()">
              <mat-icon>person</mat-icon>
              <span>View Profile</span>
            </button>
            <button mat-menu-item (click)="editPreferences()">
              <mat-icon>settings</mat-icon>
              <span>Edit Preferences</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="logout()">
              <mat-icon>logout</mat-icon>
              <span>Logout</span>
            </button>
          </mat-menu>
        } @else {
          <button app-button variant="primary" (buttonClick)="login()">Login</button>
        }
      </div>
    </nav>
  }
</header>
