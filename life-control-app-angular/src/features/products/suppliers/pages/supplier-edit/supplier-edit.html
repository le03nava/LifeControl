@if (generalError(); as errorMessage) {
  <div class="error-banner" role="alert">{{ errorMessage }}</div>
}

<app-suppliers-form
  [formGroup]="supplierForm()"
  [serverErrors]="serverErrors()"
  [editMode]="isEditMode()"
  [countries]="countries()"
  [addressServerErrors]="addressServerErrors()"
  (saveSupplier)="onSaveSupplier($event)"
  (cancelForm)="cancelForm()"
/>
