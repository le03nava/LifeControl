<h2 mat-dialog-title>Remove Supplier Assignment</h2>
<mat-dialog-content>
  <p>Are you sure you want to remove the assignment for <strong>{{ data.supplierName }}</strong>?</p>
  <p class="warning-text">This action cannot be undone.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="warn" [mat-dialog-close]="true">Remove</button>
</mat-dialog-actions>
