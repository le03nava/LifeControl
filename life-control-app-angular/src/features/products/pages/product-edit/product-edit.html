@if (generalError(); as errorMessage) {
  <div class="error-banner" role="alert">{{ errorMessage }}</div>
}

<app-products-form
  [formGroup]="productForm()"
  [serverErrors]="serverErrors()"
  (saveProduct)="onSaveProduct($event)"
  (cancelForm)="cancelForm()"
/>

@if (isEditMode()) {
  <div class="manage-suppliers-section">
    <button mat-stroked-button color="primary" (click)="navigateToSuppliers()">
      <mat-icon fontIcon="inventory_2" />
      Manage Suppliers
    </button>
  </div>
}
