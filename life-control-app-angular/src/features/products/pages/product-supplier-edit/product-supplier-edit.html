<!-- Product Header -->
<app-page-header
  [title]="product()?.name ?? 'Supplier Assignment'"
  [subtitle]="headerSubtitle()"
/>

@if (generalError(); as errorMessage) {
  <app-error-banner [message]="errorMessage" />
}

<app-product-supplier-form
  [formGroup]="assignmentForm()"
  [serverErrors]="serverErrors()"
  [editMode]="isEditMode()"
  [availableSuppliers]="availableSuppliers()"
  (saveSupplier)="onSaveAssignment($event)"
  (cancelForm)="cancelForm()"
/>
