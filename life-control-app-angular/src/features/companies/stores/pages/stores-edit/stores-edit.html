<div class="stores-edit-page">
  <app-stores-form
    [companies]="companies()"
    [companyCountries]="companyCountries()"
    [regions]="regionList()"
    [storeToEdit]="storeToEdit()"
    [serverErrors]="serverErrors()"
    [initialCompanyId]="initialCompanyId()"
    [initialCountryId]="initialCountryId()"
    [initialRegionId]="initialRegionId()"
    [initialZoneId]="initialZoneId()"
    (save)="onSaveStore($event)"
    (cancel)="onCancelForm()"
    (selectedCompanyChange)="onSelectedCompanyChange($event)"
    (selectedCountryChange)="onSelectedCountryChange($event)"
    (selectedRegionChange)="onSelectedRegionChange($event)"
  />
</div>
