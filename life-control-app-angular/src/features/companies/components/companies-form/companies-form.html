<div class="form-card">
  <h2>
    @if (isEditMode()) {
      Editar Compañía
    } @else {
      Nueva Compañía
    }
  </h2>
  <form [formGroup]="formGroup()" (ngSubmit)="onSave()">
    <mat-form-field appearance="outline">
      <mat-label>ID de Compañía</mat-label>
      <input
        matInput
        type="number"
        formControlName="companyId"
        placeholder="Ingrese el ID numérico de la compañía"
      />
      <app-form-error [control]="getControl('companyId')" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Nombre de la Empresa</mat-label>
      <input matInput formControlName="companyName" placeholder="Ingrese el nombre de la empresa" />
      <app-form-error [control]="getControl('companyName')" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tipo de Persona</mat-label>
      <mat-select formControlName="tipoPersonaId">
        @for (type of personaTypes; track type.value) {
          <mat-option [value]="type.value">{{ type.label }}</mat-option>
        }
      </mat-select>
      <app-form-error [control]="getControl('tipoPersonaId')" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Razón Social</mat-label>
      <input matInput formControlName="razonSocial" placeholder="Ingrese la razón social" />
      <app-form-error [control]="getControl('razonSocial')" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>RFC</mat-label>
      <input matInput formControlName="rfc" placeholder="Ingrese el RFC (12-13 caracteres)" />
      <app-form-error [control]="getControl('rfc')" [customMessages]="rfcErrorMessages" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Correo Electrónico</mat-label>
      <mat-icon matPrefix>mail</mat-icon>
      <input matInput type="email" formControlName="email" placeholder="correo@ejemplo.com" />
      <app-form-error [control]="getControl('email')" [customMessages]="emailErrorMessages" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Teléfono</mat-label>
      <mat-icon matPrefix>phone</mat-icon>
      <input matInput formControlName="phone" placeholder="+52XXXXXXXXXX o 10 dígitos" />
      <app-form-error [control]="getControl('phone')" [customMessages]="phoneErrorMessages" />
    </mat-form-field>

    <mat-form-field class="full-width" appearance="outline">
      <mat-label>Dirección</mat-label>
      <input matInput formControlName="address" placeholder="Ingrese la dirección" />
    </mat-form-field>

    <div class="toggle-container">
      <mat-slide-toggle formControlName="enabled">Activo</mat-slide-toggle>
    </div>

    <div class="form-actions">
      <button mat-button type="button" (click)="onCancel()">Cancelar</button>
      <button mat-flat-button type="submit" [disabled]="!formGroup().valid">
        @if (!isEditMode()) {
          Guardar
        } @else {
          Actualizar
        }
      </button>
    </div>
  </form>
</div>
