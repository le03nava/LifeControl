<div class="countries-page">
  <h1>Gestión de Países</h1>

  <mat-form-field appearance="outline" class="company-selector">
    <mat-label>Empresa</mat-label>
    <mat-select (selectionChange)="onCompanyChange($event.value)">
      <mat-option value="">— Seleccionar empresa —</mat-option>
      @for (company of companies(); track company.id) {
        <mat-option [value]="company.id">{{ company.companyName }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  @if (selectedCompanyId()) {
    <app-country-selector
      [countries]="countryService.countries()"
      [assignedCountries]="companyCountryService.assignedCountries()"
      [loading]="companyCountryService.loading()"
      [errorMessage]="companyCountryService.error()"
      (addCountry)="onAddCountry($event)"
      (removeCountry)="onRemoveCountry($event)"
    />
  } @else {
    <p class="empty-prompt">Seleccioná una empresa para gestionar sus países</p>
  }
</div>
