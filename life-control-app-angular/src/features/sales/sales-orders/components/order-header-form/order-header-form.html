<!-- Status + Order Number display (edit mode) -->
@if (loadedOrder(); as order) {
  <div class="status-section">
    @if (order.orderNumber) {
      <span class="order-number">
        <strong>Order:</strong> {{ order.orderNumber }}
      </span>
    }
    <mat-chip
      [style.background-color]="statusColor[order.statusName] || '#9e9e9e'"
      [style.color]="'#fff'"
      disableRipple
    >
      {{ statusLabel[order.statusName] || order.statusName }}
    </mat-chip>
  </div>
}
