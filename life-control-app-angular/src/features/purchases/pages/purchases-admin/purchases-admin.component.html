<div class="purchases-admin">
  <h1 class="dashboard-title">Purchases Administration</h1>
  <p class="dashboard-subtitle">Manage purchase orders and procurement</p>

  <div class="dashboard-cards">
    @for (card of cards; track card.title) {
      <mat-card
        class="dashboard-card"
        [class.card--disabled]="card.disabled"
        [routerLink]="!card.disabled ? card.route : null"
      >
        <mat-card-content>
          <div class="card-icon">
            <mat-icon [fontIcon]="card.icon" />
          </div>
          <h2 class="card-title">{{ card.title }}</h2>
          <p class="card-description">{{ card.description }}</p>
          @if (!card.disabled) {
            <span class="card-action">Manage {{ card.title }} →</span>
          } @else {
            <span class="card-badge--coming-soon">Coming soon</span>
          }
        </mat-card-content>
      </mat-card>
    }
  </div>
</div>
